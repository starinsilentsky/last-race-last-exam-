<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Сладкий рай{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Times New Roman', Times, serif;
            background: #ffffff;
            color: #222;
            min-height: 100vh;
        }

        /* Header */
        header {
            background: #FC34C8;
            color: #fff;
            padding: 0 32px;
            display: flex;
            align-items: center;
            gap: 20px;
            min-height: 70px;
            box-shadow: 0 2px 8px rgba(252,52,200,0.3);
        }
        header img {
            height: 52px;
            object-fit: contain;
        }
        header h1 {
            font-size: 1.7rem;
            font-weight: bold;
            letter-spacing: 1px;
            flex: 1;
        }
        header nav a {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            margin-left: 20px;
            padding: 6px 14px;
            border-radius: 4px;
            border: 2px solid rgba(255,255,255,0.5);
            transition: background 0.2s;
        }
        header nav a:hover, header nav a.active {
            background: #31EBFF;
            color: #222;
            border-color: #31EBFF;
        }

        /* Main content */
        main {
            max-width: 1300px;
            margin: 30px auto;
            padding: 0 24px;
        }

        /* Flash messages */
        .flash {
            padding: 12px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        .flash.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .flash.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .flash.info    { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }

        /* Accent button */
        .btn-accent {
            background: #31EBFF;
            color: #222;
            border: none;
            padding: 9px 22px;
            border-radius: 6px;
            font-family: 'Times New Roman', serif;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: filter 0.15s;
        }
        .btn-accent:hover { filter: brightness(0.9); }

        .btn-pink {
            background: #FC34C8;
            color: #fff;
            border: none;
            padding: 9px 22px;
            border-radius: 6px;
            font-family: 'Times New Roman', serif;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: filter 0.15s;
        }
        .btn-pink:hover { filter: brightness(0.9); }

        .btn-danger {
            background: #dc3545;
            color: #fff;
            border: none;
            padding: 7px 16px;
            border-radius: 5px;
            font-family: 'Times New Roman', serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: filter 0.15s;
        }
        .btn-danger:hover { filter: brightness(0.85); }

        /* Page heading */
        .page-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .page-heading h2 {
            font-size: 1.6rem;
            color: #FC34C8;
        }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>
<header>
    <img src="{{ url_for('static', filename='img/Icon.JPG') }}" alt="Логотип">
    <h1>Кондитерская «Сладкий рай»</h1>
    <nav>
        <a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint == 'index' }}">Каталог тортов</a>
        <a href="{{ url_for('new_cake') }}" class="{{ 'active' if request.endpoint == 'new_cake' }}">+ Добавить торт</a>
    </nav>
</header>

<main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</main>
</body>
</html>
