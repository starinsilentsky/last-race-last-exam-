{% extends 'base.html' %}
{% block title %}{{ title }} — Сладкий рай{% endblock %}

{% block extra_style %}
<style>
    .form-card {
        max-width: 780px;
        margin: 0 auto;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 2px 16px rgba(252,52,200,0.1);
        border: 1px solid #fde0f8;
        overflow: hidden;
    }
    .form-card-header {
        background: #FC34C8;
        color: #fff;
        padding: 18px 28px;
        font-size: 1.3rem;
        font-weight: bold;
    }
    .form-body {
        padding: 28px;
    }
    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
    }
    .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }
    .form-group.full {
        grid-column: 1 / -1;
    }
    .form-group label {
        font-size: 0.9rem;
        font-weight: bold;
        color: #555;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
        font-family: 'Times New Roman', serif;
        font-size: 0.97rem;
        padding: 9px 13px;
        border: 1px solid #ddd;
        border-radius: 6px;
        outline: none;
        transition: border-color 0.15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
        border-color: #FC34C8;
        box-shadow: 0 0 0 3px rgba(252,52,200,0.1);
    }
    .form-group textarea {
        min-height: 80px;
        resize: vertical;
    }
    .photo-preview {
        margin-top: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .photo-preview img {
        height: 70px;
        width: 80px;
        object-fit: cover;
        border-radius: 6px;
        border: 2px solid #FC34C8;
    }
    .form-actions {
        margin-top: 28px;
        display: flex;
        gap: 14px;
        align-items: center;
    }
    .required-star { color: #FC34C8; }

    /* Preview section */
    .preview-hint {
        font-size: 0.82rem;
        color: #aaa;
        margin-top: 4px;
    }
</style>
{% endblock %}

{% block content %}
<div class="page-heading">
    <h2>{{ '✏️' if cake else '➕' }} {{ title }}</h2>
    <a href="{{ url_for('index') }}" class="btn-accent">← Назад к каталогу</a>
</div>

<div class="form-card">
    <div class="form-card-header">{{ title }}</div>
    <div class="form-body">
        <form method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label>Артикул <span class="required-star">*</span></label>
                    <input type="text" name="article" required value="{{ cake.article if cake else '' }}" placeholder="T001C1">
                </div>
                <div class="form-group">
                    <label>Единица измерения</label>
                    <input type="text" name="unit" value="{{ cake.unit if cake else 'шт.' }}" placeholder="шт.">
                </div>
                <div class="form-group full">
                    <label>Наименование <span class="required-star">*</span></label>
                    <input type="text" name="name" required value="{{ cake.name if cake else '' }}" placeholder="Наполеон">
                </div>
                <div class="form-group">
                    <label>Кондитерская / Бренд</label>
                    <input type="text" name="brand" value="{{ cake.brand if cake else '' }}" placeholder="Сладкая радость">
                </div>
                <div class="form-group">
                    <label>Тип торта</label>
                    <input type="text" name="cake_type" value="{{ cake.cake_type if cake else '' }}" placeholder="Классический бисквитный">
                </div>
                <div class="form-group">
                    <label>Категория</label>
                    <input type="text" name="category" value="{{ cake.category if cake else '' }}" placeholder="Праздничный">
                </div>
                <div class="form-group">
                    <label>Цена (руб.) <span class="required-star">*</span></label>
                    <input type="number" name="price" required step="0.01" min="0" value="{{ cake.price if cake else '' }}" placeholder="2190">
                </div>
                <div class="form-group">
                    <label>Скидка (%)</label>
                    <input type="number" name="discount" min="0" max="100" value="{{ cake.discount if cake else 0 }}" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Кол-во на складе (шт.)</label>
                    <input type="number" name="stock" min="0" value="{{ cake.stock if cake else 0 }}" placeholder="10">
                </div>
                <div class="form-group">
                    <label>Файл фото</label>
                    <input type="text" name="photo" id="photoInput" value="{{ cake.photo if cake else '' }}" placeholder="napoleon.jpg" oninput="updatePreview(this.value)">
                    <div class="preview-hint">Имя файла из папки static/img/</div>
                </div>
                <div class="form-group full">
                    <label>Описание товара</label>
                    <textarea name="description" placeholder="Краткое описание торта...">{{ cake.description if cake else '' }}</textarea>
                </div>
            </div>

            <div class="photo-preview" id="photoPreview" style="{{ '' if (cake and cake.photo) else 'display:none' }}">
                <img id="previewImg" src="{{ url_for('static', filename='img/' + cake.photo) if (cake and cake.photo) else '' }}" alt="Превью">
                <span style="color:#888;font-size:0.9rem;">Предпросмотр фото</span>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-pink">💾 Сохранить</button>
                <a href="{{ url_for('index') }}" class="btn-accent">Отмена</a>
            </div>
        </form>
    </div>
</div>

<script>
function updatePreview(filename) {
    const preview = document.getElementById('photoPreview');
    const img = document.getElementById('previewImg');
    if (filename) {
        img.src = '/static/img/' + filename;
        img.onerror = () => { preview.style.display = 'none'; };
        img.onload = () => { preview.style.display = 'flex'; };
        preview.style.display = 'flex';
    } else {
        preview.style.display = 'none';
    }
}
</script>
{% endblock %}
